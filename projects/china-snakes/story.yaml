  title: चीन में सांपों का सैलाब 🐍 — बाढ़ में snake farm बही, 800+ सांप गाँव में
    | Viral
  description: >
    चीन के Guangxi में Typhoon Maysak की भयानक बाढ़ में एक snake farm बह गई — और
    800 से ज़्यादा सांप, जिनमें ज़हरीले cobra भी, पूरे गाँव में फैल गए। एक
    ग्रामीण को सांप ने काटा और अस्पताल ले जाना पड़ा। बाढ़ में कम से कम 6 लोगों
    की जान गई और करीब 3.75 लाख लोग प्रभावित हुए।


    आपने कभी ऐसा मंज़र देखा है? नीचे comment में बताइए।

    Follow for daily world news, explained in Hinglish. 🇮🇳


    Sources: Hengzhou village (Guangxi, China) snake-farm flood escape, 6-7 July
