publish:
  title: Nashik की तबाही — Godavari उफान पर, Igatpuri में 729mm बारिश | Monsoon 2026
  description: >
    Nashik में monsoon 2026 का कहर — सिर्फ़ एक दिन में Igatpuri में 729mm,
    Trimbakeshwar में 150mm और Nashik शहर में 107mm बारिश। पवित्र Godavari नदी
    उफान पर, Ramkund के घाट और मंदिर जलमग्न। Nandur Madhyameshwar dam से 2 लाख
    cusec से ज़्यादा पानी छोड़ा गया, 27 पेड़ गिरे, सड़कें धंसीं और Mumbai-Nashik
    trains घंटों लेट। प्रशासन ने नदी किनारे के निवासियों को alert किया।


    आपको क्या लगता है — क्या हमारे शहर हर मानसून की इस बाढ़ के लिए तैयार हैं?
    नीचे comment में बताइए।

    Follow for daily India news, explained in Hinglish. 🇮🇳


    Sources: Nashik/Godavari flood, 8 July 2026 · Igatpuri 729mm, Trimbakeshwar
    150mm, Nashik city 107mm (IMD) · Gangapur dam ~45%, Nandur Madhyameshwar
    discharge ~2,11,965 cusecs · 27 trees uprooted, Mumbai–Nashik trains delayed
    ~1hr. Reporting: Free Press Journal, Deccan Herald, India.com, News9.

    Credits: News footage — NEWS9 Live (editorial/fair-use, attributed) · b-roll
    — Pexels · Voice — Sarvam Bulbul · Music — "Tension" by Kevin MacLeod (incompetech.com), CC-BY 4.0.

    Disclaimer: A news explainer compiled from public reporting; facts per cited
    sources as of July 2026. No casualty figures were officially confirmed at
    the time of publishing.
