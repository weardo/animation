publish:
  title: India की परमाणु कसम — No First Use बदलनी चाहिए? | Nuclear Doctrine Debate
  description: >
    India की Nuclear Doctrine समझिए — Credible Minimum Deterrence, No First Use
    (NFU) की कसम, massive retaliation, और सिर्फ़ Prime Minister की अगुवाई वाली
    Nuclear Command Authority। 1998 के Pokhran-II tests के बाद अपनाई गई ये
    policy India को एक ज़िम्मेदार परमाणु ताकत बनाती है (और 2008 के India-US
    Civil Nuclear Deal तक का रास्ता खोला)।


    पर अब China 2030 तक 1000+ warheads की ओर बढ़ रहा है और Pakistan tactical
    nukes बना रहा है — तो experts पूछ रहे हैं: क्या India को NFU छोड़नी चाहिए या
    और flexible होना चाहिए?


    आपको क्या लगता है — India को अपनी No First Use कसम पर कायम रहना चाहिए, या
    वक़्त आ गया है बदलने का? नीचे comment में बताइए।

    Follow for daily India news & geopolitics, explained in Hinglish. 🇮🇳


    Sources: India's Nuclear Doctrine (2003 NCA statement) — Credible Minimum
    Deterrence, No First Use, massive retaliation, civilian (PM-led) command ·
    adopted after Pokhran-II (1998) · India-US Civil Nuclear Deal (2008) ·
    projections on China's arsenal (~1000+ warheads by 2030) and Pakistan's
    tactical nuclear weapons per open-source strategic analysis.

    Credits: b-roll — Pexels · Voice — Sarvam Bulbul · Music — "The Descent" by
    Kevin MacLeod (incompetech.com), CC-BY 4.0.

    Disclaimer: An explainer compiled from public doctrine + open-source
    analysis; force projections are estimates per cited analysts, not official
    figures.
