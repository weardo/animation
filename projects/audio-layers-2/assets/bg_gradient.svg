<?xml version="1.0" encoding="UTF-8"?>
<!-- bg_gradient — flat-vector Kurzgesagt-style background (deep night-sky gradient + faint
     star dots + a soft ground glow). Pure static art: identity is immutable, animated only by
     the compositor's transform + parallax. CC0 / authored. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1b33"/>
      <stop offset="0.55" stop-color="#1b2a4a"/>
      <stop offset="1" stop-color="#2c4a7a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="1.05" r="0.9">
      <stop offset="0" stop-color="#ffcf4d" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#ffcf4d" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffcf4d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1920" height="1080" fill="url(#sky)"/>
  <!-- faint star field (a few hand-placed dots; static + deterministic) -->
  <g fill="#ffffff" fill-opacity="0.5">
    <circle cx="180"  cy="160" r="2.5"/>
    <circle cx="420"  cy="90"  r="1.8"/>
    <circle cx="760"  cy="220" r="2.2"/>
    <circle cx="1040" cy="120" r="1.6"/>
    <circle cx="1320" cy="200" r="2.6"/>
    <circle cx="1600" cy="110" r="1.9"/>
    <circle cx="1780" cy="260" r="2.3"/>
    <circle cx="300"  cy="340" r="1.5"/>
    <circle cx="900"  cy="60"  r="1.7"/>
    <circle cx="1480" cy="330" r="1.4"/>
  </g>
  <!-- soft warm glow rising from the horizon -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#glow)"/>
</svg>
