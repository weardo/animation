title: Matter Test
format: { aspect: "16:9" }
style: plain
cast: {}
beats:
  - id: bounce
    say: "A ball bounces under real gravity."
    duration: { seconds: 5 }
    show:
      - generator: sim
        as: viz
        args:
          z: 0
          code: |
            var bg = '<rect x="0" y="0" width="'+width+'" height="'+height+'" fill="#0a0d14"/>';
            var eng = Matter.Engine.create();
            eng.gravity.y = 1;
            var ground = Matter.Bodies.rectangle(width/2, height-60, width, 40, { isStatic: true, restitution: 0.9 });
            var ball = Matter.Bodies.circle(width/2, 180, 44, { restitution: 0.9 });
            Matter.Composite.add(eng.world, [ground, ball]);
            for (var i = 0; i < frame; i++) Matter.Engine.update(eng, 1000 / fps);
            return bg
              + '<rect x="0" y="'+(height-80)+'" width="'+width+'" height="40" fill="#33405a"/>'
              + '<circle cx="'+ball.position.x+'" cy="'+ball.position.y+'" r="44" fill="#4a90d9"/>';
          params: {}
    camera: hold
