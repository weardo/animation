# examples/story.yaml — a small MULTI-BEAT STORY, told as N sequenced scenes on the GLOBAL
# timeline with TRANSITIONS between them (spec §11.2 / §15 M2 multi-scene storytelling).
#
# THE STORY ("Blip's Story") — four beats, each its own scene, played as one continuous film:
#   b1  Blip appears.                         a friendly procedural character pops in (establishing camera)
#   b2  A neuron network grows around it.     the bead-string generator reveals (slow push-in)  [fade]
#   b3  A pulse travels down the chain.       the network fires/pulses (held, intimate frame)    [fade]
#   b4  Billions of signals → a thought.      the closing beat pulls back out                    [slide ←]
#
# HOW IT BECOMES A FILM (the multi-scene contract this exercises):
#   • each beat lowers to ONE scene with its own duration, camera move, and look;
#   • the per-beat `transition` lowers to that scene's `transition_in`, and the compositor overlaps it
#     with the previous scene's tail via @remotion/transitions (TransitionSeries);
#   • `config.duration_frames` = Σ scene.duration_frames − Σ transition overlaps.
#
# ASSETS USED (all existing): the PROCEDURAL `blip` character (PRIMARY provider — pure SVG/DOM, so the
# render is deterministic on gl:'angle' with no software-GL disk bloat), the `bead-string` neuron
# generator, and the gradient background. Authored as semantic INTENT only (no frames/coordinates).
#
# Build it as a project (compiles + vendors assets + renders one continuous mp4):
#   tsx src/cli/render.ts examples/story.yaml --project blip-story --name "Blip's Story"

title: "Blip's Story"

characters:
  blip:
    rig: blip
    palette: warm

beats:
  # b1 — Blip appears. No inbound transition (nothing precedes the first scene).
  - id: b1
    say: "This is Blip."
    camera: establishing
    duration: { seconds: 3 }

  # b2 — A neuron network grows around Blip. Fade in from the intro.
  - id: b2
    say: "Inside Blip's head is a network of neurons."
    show:
      - generator: bead-string
        as: neuron_chain
    camera: slow_push_in
    duration: { seconds: 4 }
    transition: { kind: fade, duration: 18 }

  # b3 — A pulse travels down the chain. Hold on the firing network.
  - id: b3
    say: "When one fires, a pulse races down the chain."
    show:
      - generator: bead-string
        as: neuron_chain
    action:
      - on: neuron_chain
        do: pulse_travel
    camera: hold
    duration: { seconds: 4 }
    transition: { kind: fade, duration: 18 }

  # b4 — Closing beat: billions of signals become a thought. Pull back and slide on.
  - id: b4
    say: "Billions of these signals become a single thought."
    show:
      - generator: bead-string
        as: neuron_chain
    camera: slow_pull_out
    duration: { seconds: 3 }
    transition: { kind: slide, dir: left, duration: 18 }
