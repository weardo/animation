# hormuz-reel — CINEMATIC DARK news-explainer reel (Johnny Harris style, Hinglish).
# 9:16 vertical geopolitics explainer on the Strait of Hormuz chokepoint. Premium visual standard:
# near-black background + focal radial glow, REGION-ZOOMED maps with glowing highlighted countries,
# huge Mukta-ExtraBold dual-script (Devanagari+Latin) headlines with glow/shadow, a story-level
# post-grade (contrast + vignette + grain) for cinematic depth. Voice: Sarvam Bulbul (shubh).
#
# Verify visuals FAST on stills:  render projects/hormuz-reel/story.yaml --project hormuz-reel --frames auto --no-audio
# Full reel (Sarvam VO):          SARVAM_API_KEY=... render projects/hormuz-reel/story.yaml --project hormuz-reel --engine sarvam --voice shubh
title: "Hormuz — Cinematic Reel"
style: plain

format:
  aspect: "9:16"
  fps: 30

# CINEMATIC POST GRADE (whole-frame): punch contrast, heavy vignette, subtle film grain → depth.
post:
  - { kind: color_grade, brightness: 1.0, contrast: 1.18, saturate: 1.15 }
  - { kind: vignette, amount: 0.6, softness: 0.5 }
  - { kind: grain, amount: 0.055, size: 0.9, seed: 7 }

cast: {}

# Reusable font URIs (Mukta ExtraBold = dual-script heavy display; one font for all Hinglish).
# (repeated per text layer below; a story-level text default is a later ergonomic win)

beats:
  # ============================================================ B1 — HOOK ============================
  - id: hook
    say: "ये है Strait of Hormuz, दुनिया का सबसे important तेल रास्ता।"
    show:
      # near-black base
      - shape: rect
        as: bg
        args: { z: 0, position: [540, 960], params: { width: 1080, height: 1920 }, fill: { a: 0, k: "#0a0d14" } }
      # warm focal glow (blurred amber orb, low opacity) — cinematic spotlight
      - generator: world-in
        as: world
        args:
          projection: mercator
          fit: false
          center: [50, 27]
          scale: 780
          center_to: [55, 26]
          scale_to: 1050
          fly: { delay: 24, duration: 70, easing: easeInOut }
          key_field: name
          fill: "#141c28"
          no_data_fill: "#141c28"
          stroke: "#243040"
          stroke_width: 0.8
          draw_on: { duration: 24, stagger: 0, easing: easeOut }
          draw_on_stroke: true
          draw_on_fill: true
          choropleth:
            Iran: "#ffb020"
            "Saudi Arabia": "#ffb020"
            "United Arab Emirates": "#ffb020"
            Oman: "#ffb020"
            Qatar: "#ffb020"
            Kuwait: "#ffb020"
          ocean: "#0a1420"
          graticule: { step: 8, color: "#1a2636", opacity: 0.45, width: 0.6 }
          # shipping route: out of the Strait of Hormuz into the Arabian Sea (glowing, draws on, arrow)
          routes:
            - coords: [[56.4, 26.6], [58.5, 24.5], [62, 22], [66, 20]]
              color: "#ffd34d"
              width: 6
              arc: true
              arrow: true
              glow: 7
              draw_on: { delay: 20, duration: 34, easing: easeInOut }
          # port / chokepoint markers
          markers:
            - { coord: [56.4, 26.6], label: "Hormuz", color: "#ffd34d", radius: 11, label_size: 40 }
            - { coord: [54.4, 24.5], label: "Dubai", color: "#f5f7fa", radius: 8, label_size: 30 }
          markers_pop: { delay: 10, duration: 20, stagger: 10 }
          effects:
            - { kind: glow, color: "#ffb020", radius: 6, intensity: 0.4 }
      - text: "STRAIT OF HORMUZ"
        as: title
        at: top
        args: { z: 20, size: 78, weight: 800, color: "#f5f7fa", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", tracking: 2, effects: [ { kind: drop_shadow, dx: 0, dy: 4, blur: 14, color: "#000000", opacity: 0.8 } ], anim: { preset: rise, duration: 22, distance: 70 } }
      - text: "दुनिया का तेल रास्ता"
        as: sub
        at: bottom
        args: { z: 20, size: 54, weight: 800, color: "#ffb020", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", effects: [ { kind: glow, color: "#ffb020", radius: 8, intensity: 0.6 } ], anim: { preset: fade, duration: 18 } }
    camera: slow_push_in
    duration: { seconds: 5.5 }

  # ============================================================ B2 — THE STAT =========================
  - id: stat
    say: "दुनिया का करीब twenty percent oil इसी रास्ते से गुज़रता है।"
    show:
      - shape: rect
        as: bg
        args: { z: 0, position: [540, 960], params: { width: 1080, height: 1920 }, fill: { a: 0, k: "#0a0d14" } }
      - text: "20%"
        as: bignum
        at: center
        args: { z: 10, size: 400, weight: 800, color: "#ffb020", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", effects: [ { kind: glow, color: "#ffb020", radius: 22, intensity: 1.0 }, { kind: drop_shadow, dx: 0, dy: 8, blur: 24, color: "#000000", opacity: 0.7 } ], anim: { preset: rise, duration: 20, distance: 90 } }
      - text: "GLOBAL OIL SUPPLY"
        as: numlabel
        at: bottom
        args: { z: 20, size: 50, weight: 800, color: "#f5f7fa", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", tracking: 4, effects: [ { kind: drop_shadow, dx: 0, dy: 3, blur: 10, color: "#000000", opacity: 0.8 } ], anim: { preset: fade, duration: 18 } }
    camera: slow_push_in
    duration: { seconds: 4.5 }
    transition: { kind: fade, duration: 16 }

  # ============================================================ B3 — THE PROBLEM ======================
  - id: china
    say: "उधर China का ज़्यादातर तेल Malacca Strait से आता है, उसकी सबसे बड़ी weakness।"
    show:
      - shape: rect
        as: bg
        args: { z: 0, position: [540, 960], params: { width: 1080, height: 1920 }, fill: { a: 0, k: "#0a0d14" } }
      - generator: world-in
        as: world
        args:
          projection: mercator
          fit: false
          center: [90, 14]
          scale: 300
          key_field: name
          fill: "#141c28"
          no_data_fill: "#141c28"
          stroke: "#243040"
          stroke_width: 0.7
          ocean: "#0a1420"
          graticule: { step: 10, color: "#1a2636", opacity: 0.4, width: 0.6 }
          choropleth:
            China: "#ff4438"
          # China's vulnerable oil lane: Gulf → around India → through Malacca → up to China
          routes:
            - coords: [[57, 26], [64, 21], [74, 9], [85, 5], [96, 3.5], [100.4, 2.8], [106, 8], [114, 18], [121, 31]]
              color: "#ff6b4d"
              width: 5
              arc: true
              arrow: true
              glow: 6
              draw_on: { delay: 12, duration: 48, easing: easeInOut }
          markers:
            - { coord: [100.4, 2.8], label: "Malacca", color: "#ff4438", radius: 12, label_size: 40 }
          markers_pop: { delay: 44, duration: 18 }
          effects:
            - { kind: glow, color: "#ff4438", radius: 7, intensity: 0.45 }
      - text: "China की Weakness"
        as: title
        at: top
        args: { z: 20, size: 82, weight: 800, color: "#f5f7fa", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", effects: [ { kind: drop_shadow, dx: 0, dy: 4, blur: 14, color: "#000000", opacity: 0.85 } ], anim: { preset: rise, duration: 20, distance: 70 } }
      - text: "Malacca Strait"
        as: sub
        at: bottom
        args: { z: 20, size: 54, weight: 800, color: "#ff6b4d", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", effects: [ { kind: glow, color: "#ff4438", radius: 8, intensity: 0.6 } ], anim: { preset: fade, duration: 18 } }
    camera: slow_push_in
    duration: { seconds: 5.5 }
    transition: { kind: fade, duration: 16 }

  # ============================================================ B4 — INDIA'S MOVE =====================
  - id: india
    say: "अब India, Chabahar port से एक नया रास्ता बना रहा है।"
    show:
      - shape: rect
        as: bg
        args: { z: 0, position: [540, 960], params: { width: 1080, height: 1920 }, fill: { a: 0, k: "#0a0d14" } }
      - generator: world-in
        as: world
        args:
          projection: mercator
          fit: false
          center: [66, 24]
          scale: 700
          key_field: name
          fill: "#141c28"
          no_data_fill: "#141c28"
          stroke: "#243040"
          stroke_width: 0.8
          ocean: "#0a1420"
          graticule: { step: 8, color: "#1a2636", opacity: 0.4, width: 0.6 }
          choropleth:
            India: "#ffb020"
            Iran: "#2ee6a6"
          # India's new corridor: Mumbai → Chabahar port (bypassing the Hormuz chokepoint)
          routes:
            - coords: [[72.8, 18.9], [67, 22], [60.6, 25.3]]
              color: "#2ee6a6"
              width: 5
              arc: true
              arrow: true
              glow: 6
              draw_on: { delay: 14, duration: 36, easing: easeInOut }
          markers:
            - { coord: [60.6, 25.3], label: "Chabahar", color: "#2ee6a6", radius: 12, label_size: 38 }
            - { coord: [72.8, 18.9], label: "Mumbai", color: "#f5f7fa", radius: 8, label_size: 28 }
          markers_pop: { delay: 28, duration: 18, stagger: 8 }
          effects:
            - { kind: glow, color: "#2ee6a6", radius: 7, intensity: 0.45 }
      - text: "India का Move"
        as: title
        at: top
        args: { z: 20, size: 82, weight: 800, color: "#f5f7fa", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", effects: [ { kind: drop_shadow, dx: 0, dy: 4, blur: 14, color: "#000000", opacity: 0.85 } ], anim: { preset: rise, duration: 20, distance: 70 } }
      - text: "Chabahar Port"
        as: sub
        at: bottom
        args: { z: 20, size: 54, weight: 800, color: "#2ee6a6", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", effects: [ { kind: glow, color: "#2ee6a6", radius: 8, intensity: 0.6 } ], anim: { preset: fade, duration: 18 } }
    camera: slow_push_in
    duration: { seconds: 4.5 }
    transition: { kind: fade, duration: 16 }

  # ============================================================ B5 — THE PAYOFF =======================
  - id: payoff
    say: "एक chokepoint, जो पूरा game पलट सकता है।"
    show:
      - shape: rect
        as: bg
        args: { z: 0, position: [540, 960], params: { width: 1080, height: 1920 }, fill: { a: 0, k: "#0a0d14" } }
      - text: "GAME पलट सकता है"
        as: big
        at: center
        args: { z: 10, size: 108, weight: 800, color: "#ffb020", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", effects: [ { kind: glow, color: "#ffb020", radius: 18, intensity: 0.9 }, { kind: drop_shadow, dx: 0, dy: 6, blur: 20, color: "#000000", opacity: 0.7 } ], anim: { preset: rise, duration: 22, distance: 90 } }
    camera: slow_push_in
    duration: { seconds: 4.2 }
    transition: { kind: fade, duration: 16 }

  # ============================================================ B6 — CTA ==============================
  - id: cta
    say: "ऐसी और news के लिए follow करो!"
    show:
      - shape: rect
        as: bg
        args: { z: 0, position: [540, 960], params: { width: 1080, height: 1920 }, fill: { a: 0, k: "#0a0d14" } }
      - text: "FOLLOW करो!"
        as: cta
        at: center
        args: { z: 10, size: 120, weight: 800, color: "#f5f7fa", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", effects: [ { kind: glow, color: "#ffb020", radius: 16, intensity: 0.8 }, { kind: drop_shadow, dx: 0, dy: 6, blur: 20, color: "#000000", opacity: 0.7 } ], anim: { preset: rise, duration: 20, distance: 80 } }
    camera: hold
    duration: { seconds: 3.2 }
    transition: { kind: fade, duration: 16 }
