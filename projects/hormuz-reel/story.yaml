# hormuz-reel — CINEMATIC geopolitics reel with a COHERENT 10-stage narrative arc.
# Thesis: chokepoints are the hidden battleground of geopolitics, and India vs China are racing to
# escape them. Stages: HOOK → SETUP → STAKES → TURN → ESCALATION → THE MOVE → THE COUNTER → INSIGHT
# → PAYOFF → CTA. Hinglish VO (Sarvam shubh). Cinematic dark + map v2 toolkit (routes/markers/fly-to/
# ocean/graticule) + OFFICIAL India map (world-in) + Mukta ExtraBold dual-script type.
title: "Chokepoint Wars — Cinematic Reel"
style: plain
format:
  aspect: "9:16"
  fps: 30

post:
  - { kind: color_grade, brightness: 1.0, contrast: 1.18, saturate: 1.15 }
  - { kind: vignette, amount: 0.6, softness: 0.5 }
  - { kind: grain, amount: 0.055, size: 0.9, seed: 7 }

# Dark, tense music bed (built-in `drone`) — auto-ducked low while the narration speaks.
music: { ref: "audio/tension.mp3", gain: 0.6, duck: 0.32, fade: 16 }

cast: {}

beats:
  # ==================================================== B1 — HOOK ====================================
  - id: hook
    say: "समंदर का एक छोटा सा रास्ता, जो पूरी दुनिया की economy हिला सकता है।"
    sfx:
      - { name: whoosh, at: 2 }
      - { name: pop, at: 8 }
    show:
      - shape: rect
        as: bg
        args: { z: 0, position: [540, 960], params: { width: 1080, height: 1920 }, fill: { a: 0, k: "#0a0d14" } }
      # CINEMATIC OPENING: real oil-tanker B-roll (Pexels, factory:footage), GRADED dark to match the
      # palette (darken + desaturate + warm) + softened + vignetted so it reads as one system with the maps.
      - footage: tanker
        as: broll
        args:
          z: 1
          loop: true
          muted: true
          fit: cover
          effects:
            - { kind: color_grade, brightness: 0.46, contrast: 1.14, saturate: 0.6, hue: 18 }
            - { kind: blur, radius: 2 }
            - { kind: vignette, amount: 0.45, softness: 0.6 }
      # dark scrim for text legibility over the footage
      - shape: rect
        as: scrim
        args: { z: 2, position: [540, 960], params: { width: 1080, height: 1920 }, fill: { a: 0, k: "#0a0d14" }, opacity: 0.45 }
      # first-frame text hook (fast, near-instant) — 92% watch on mute, so the on-screen line is the hook
      - text: "एक रास्ता। पूरी दुनिया।"
        as: hooktext
        at: center
        args: { z: 20, size: 92, weight: 800, color: "#f5f7fa", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", effects: [ { kind: glow, color: "#ffb020", radius: 12, intensity: 0.6 }, { kind: drop_shadow, dx: 0, dy: 5, blur: 18, color: "#000000", opacity: 0.85 } ], anim: { preset: fade, duration: 5 } }
    camera: slow_push_in
    duration: { seconds: 4.9 }

  # ==================================================== B2 — SETUP (Hormuz) ==========================
  - id: setup
    say: "ये है Strait of Hormuz। सिर्फ़ चालीस किलोमीटर चौड़ा, लेकिन दुनिया का बीस परसेंट तेल यहीं से गुज़रता है।"
    sfx:
      - { name: whoosh, at: 2 }
      - { name: pop, at: 4 }
      - { name: tick, at: 14 }
      - { name: whoosh, at: 24 }
    show:
      - shape: rect
        as: bg
        args: { z: 0, position: [540, 960], params: { width: 1080, height: 1920 }, fill: { a: 0, k: "#0a0d14" } }
      - generator: world-in
        as: world
        args:
          projection: mercator
          fit: false
          center: [52, 27]
          scale: 800
          center_to: [55, 26]
          scale_to: 1050
          fly: { delay: 30, duration: 80, easing: easeInOut }
          fill: "#223249"
          no_data_fill: "#223249"
          stroke: "#3a516c"
          stroke_width: 0.8
          ocean: "#0a1420"
          graticule: { step: 8, color: "#1a2636", opacity: 0.4, width: 0.6 }
          labels:
            Iran: Iran
            "Saudi Arabia": Saudi Arabia
            "United Arab Emirates": UAE
            Oman: Oman
          choropleth:
            Iran: "#ffb020"
            "Saudi Arabia": "#ffb020"
            "United Arab Emirates": "#ffb020"
            Oman: "#ffb020"
            Qatar: "#ffb020"
            Kuwait: "#ffb020"
          routes:
            - coords: [[56.4, 26.6], [58.5, 24.5], [62, 22], [66, 20]]
              color: "#ffd34d"
              width: 6
              arc: true
              arrow: true
              glow: 7
              draw_on: { delay: 24, duration: 40, easing: easeInOut }
          markers:
            - { coord: [56.4, 26.6], label: "Hormuz", color: "#ffd34d", radius: 11, label_size: 40 }
          markers_pop: { delay: 14, duration: 20 }
      - text: "STRAIT OF HORMUZ"
        as: title
        at: top
        args: { z: 20, size: 72, weight: 800, color: "#f5f7fa", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", tracking: 2, effects: [ { kind: drop_shadow, dx: 0, dy: 4, blur: 14, color: "#000000", opacity: 0.85 } ], anim: { preset: rise, duration: 22, distance: 60 } }
      - text: "20% वैश्विक तेल"
        as: sub
        at: bottom
        args: { z: 20, size: 56, weight: 800, color: "#ffb020", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", effects: [ { kind: glow, color: "#ffb020", radius: 8, intensity: 0.6 } ], anim: { preset: fade, duration: 18 } }
    camera: hold
    duration: { seconds: 7.8 }
    transition: { kind: fade, duration: 16 }

  # ==================================================== B3 — STAKES ==================================
  - id: stakes
    say: "अगर ये एक रास्ता बंद हो जाए, तो पूरी दुनिया में पेट्रोल के दाम आसमान छू लें।"
    sfx:
      - { name: whoosh, at: 2 }
      - { name: boom, at: 6 }
      - { name: pop, at: 18 }
    show:
      - shape: rect
        as: bg
        args: { z: 0, position: [540, 960], params: { width: 1080, height: 1920 }, fill: { a: 0, k: "#0a0d14" } }
      # REAL fuel-station footage (Pexels) instead of a ⛔ emoji — graded to the dark palette + a red push
      - footage: fuel
        as: broll
        args:
          z: 1
          loop: true
          muted: true
          fit: cover
          effects:
            - { kind: color_grade, brightness: 0.5, contrast: 1.16, saturate: 0.7, hue: -8 }
            - { kind: blur, radius: 1 }
            - { kind: vignette, amount: 0.5, softness: 0.6 }
      - shape: rect
        as: scrim
        args: { z: 2, position: [540, 960], params: { width: 1080, height: 1920 }, fill: { a: 0, k: "#1a0808" }, opacity: 0.5 }
      - text: "दाम आसमान पर"
        as: big
        at: center
        args: { z: 20, size: 100, weight: 800, color: "#ff6b4d", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", effects: [ { kind: glow, color: "#ff4438", radius: 14, intensity: 0.8 }, { kind: drop_shadow, dx: 0, dy: 5, blur: 18, color: "#000000", opacity: 0.85 } ], anim: { preset: rise, duration: 12, distance: 50 } }
    camera: slow_push_in
    duration: { seconds: 4.4 }
    transition: { kind: fade, duration: 16 }

  # ==================================================== B4 — TURN (to China) =========================
  - id: turn
    say: "लेकिन इस खेल में सबसे बड़ा डर किसी और को है। China को।"
    sfx:
      - { name: whoosh, at: 2 }
      - { name: thud, at: 6 }
    show:
      - shape: rect
        as: bg
        args: { z: 0, position: [540, 960], params: { width: 1080, height: 1920 }, fill: { a: 0, k: "#0a0d14" } }
      - generator: world-in
        as: world
        args:
          projection: mercator
          fit: false
          center: [107, 22]
          scale: 740
          fill: "#223249"
          no_data_fill: "#223249"
          stroke: "#3a516c"
          stroke_width: 0.8
          ocean: "#0a1420"
          graticule: { step: 8, color: "#1a2636", opacity: 0.4, width: 0.6 }
          labels:
            China: China
            India: India
            Japan: Japan
          choropleth:
            China: "#ff4438"
          draw_on: { duration: 20, easing: easeOut }
          draw_on_fill: true
          effects:
            - { kind: glow, color: "#ff4438", radius: 8, intensity: 0.5 }
      - text: "सबसे बड़ा डर: China"
        as: title
        at: top
        args: { z: 20, size: 78, weight: 800, color: "#f5f7fa", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", effects: [ { kind: drop_shadow, dx: 0, dy: 4, blur: 14, color: "#000000", opacity: 0.85 } ], anim: { preset: rise, duration: 20, distance: 70 } }
    camera: slow_push_in
    duration: { seconds: 3.6 }
    transition: { kind: fade, duration: 16 }

  # ==================================================== B5 — ESCALATION (Malacca) ====================
  - id: malacca
    say: "China का करीब अस्सी परसेंट imported तेल Malacca Strait से आता है। एक पतली सी गली, जिसे कभी भी रोका जा सकता है। नाम है, Malacca Dilemma।"
    sfx:
      - { name: whoosh, at: 2 }
      - { name: pop, at: 4 }
      - { name: whoosh, at: 20 }
      - { name: ding, at: 60 }
    show:
      - shape: rect
        as: bg
        args: { z: 0, position: [540, 960], params: { width: 1080, height: 1920 }, fill: { a: 0, k: "#0a0d14" } }
      - generator: world-in
        as: world
        args:
          projection: mercator
          fit: false
          center: [103, 10]
          scale: 470
          fill: "#223249"
          no_data_fill: "#223249"
          stroke: "#3a516c"
          stroke_width: 0.7
          ocean: "#0a1420"
          graticule: { step: 10, color: "#1a2636", opacity: 0.4, width: 0.6 }
          labels:
            China: China
            India: India
            Indonesia: Indonesia
            Malaysia: Malaysia
          choropleth:
            China: "#ff4438"
          routes:
            - coords: [[80, 8], [90, 4.5], [97, 3.2], [100.4, 2.8], [106, 8], [114, 18], [121, 31]]
              color: "#ff6b4d"
              width: 5
              arc: true
              arrow: true
              glow: 6
              draw_on: { delay: 20, duration: 60, easing: easeInOut }
          markers:
            - { coord: [100.4, 2.8], label: "Malacca", color: "#ff4438", radius: 12, label_size: 40 }
          markers_pop: { delay: 60, duration: 18 }
          effects:
            - { kind: glow, color: "#ff4438", radius: 7, intensity: 0.45 }
      - text: "Malacca Dilemma"
        as: title
        at: top
        args: { z: 20, size: 74, weight: 800, color: "#f5f7fa", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", effects: [ { kind: drop_shadow, dx: 0, dy: 4, blur: 14, color: "#000000", opacity: 0.85 } ], anim: { preset: rise, duration: 20, distance: 60 } }
      - text: "80% चीनी तेल"
        as: sub
        at: bottom
        args: { z: 20, size: 54, weight: 800, color: "#ff6b4d", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", effects: [ { kind: glow, color: "#ff4438", radius: 8, intensity: 0.6 } ], anim: { preset: fade, duration: 18 } }
    camera: hold
    duration: { seconds: 9.4 }
    transition: { kind: fade, duration: 16 }

  # ==================================================== B6 — THE MOVE (China → Gwadar) ===============
  - id: gwadar
    say: "इससे बचने के लिए China, Pakistan के Gwadar port तक एक नया रास्ता बना रहा है।"
    sfx:
      - { name: whoosh, at: 2 }
      - { name: pop, at: 4 }
      - { name: whoosh, at: 16 }
      - { name: pop, at: 42 }
    show:
      - shape: rect
        as: bg
        args: { z: 0, position: [540, 960], params: { width: 1080, height: 1920 }, fill: { a: 0, k: "#0a0d14" } }
      - generator: world-in
        as: world
        args:
          projection: mercator
          fit: false
          center: [72, 29]
          scale: 500
          fill: "#223249"
          no_data_fill: "#223249"
          stroke: "#3a516c"
          stroke_width: 0.8
          ocean: "#0a1420"
          graticule: { step: 8, color: "#1a2636", opacity: 0.4, width: 0.6 }
          labels:
            China: China
            Pakistan: Pakistan
            India: India
            Iran: Iran
            Afghanistan: Afghanistan
          choropleth:
            China: "#ff4438"
            Pakistan: "#3a2630"
          # China's overland corridor down through Pakistan to Gwadar (bypasses Malacca)
          routes:
            - coords: [[79, 37], [74, 34], [71, 30], [66, 27], [62.3, 25.1]]
              color: "#ff9f43"
              width: 5
              arc: true
              arrow: true
              glow: 6
              draw_on: { delay: 16, duration: 42, easing: easeInOut }
          markers:
            - { coord: [62.3, 25.1], label: "Gwadar", color: "#ff9f43", radius: 12, label_size: 38 }
          markers_pop: { delay: 42, duration: 18 }
          effects:
            - { kind: glow, color: "#ff9f43", radius: 6, intensity: 0.4 }
      - text: "China का दांव"
        as: title
        at: top
        args: { z: 20, size: 78, weight: 800, color: "#f5f7fa", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", effects: [ { kind: drop_shadow, dx: 0, dy: 4, blur: 14, color: "#000000", opacity: 0.85 } ], anim: { preset: rise, duration: 20, distance: 70 } }
      - text: "Gwadar Port"
        as: sub
        at: bottom
        args: { z: 20, size: 54, weight: 800, color: "#ff9f43", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", effects: [ { kind: glow, color: "#ff9f43", radius: 8, intensity: 0.6 } ], anim: { preset: fade, duration: 18 } }
    camera: hold
    duration: { seconds: 4.7 }
    transition: { kind: fade, duration: 16 }

  # ==================================================== B7 — THE COUNTER (India → Chabahar) ==========
  - id: chabahar
    say: "और भारत? भारत ने ठीक बगल में, Iran के Chabahar port से जवाब दे दिया।"
    sfx:
      - { name: whoosh, at: 2 }
      - { name: pop, at: 4 }
      - { name: whoosh, at: 14 }
      - { name: pop, at: 28 }
    show:
      - shape: rect
        as: bg
        args: { z: 0, position: [540, 960], params: { width: 1080, height: 1920 }, fill: { a: 0, k: "#0a0d14" } }
      - generator: world-in
        as: world
        args:
          projection: mercator
          fit: false
          center: [66, 24]
          scale: 700
          fill: "#223249"
          no_data_fill: "#223249"
          stroke: "#3a516c"
          stroke_width: 0.8
          ocean: "#0a1420"
          graticule: { step: 8, color: "#1a2636", opacity: 0.4, width: 0.6 }
          labels:
            India: India
            Iran: Iran
            Pakistan: Pakistan
          choropleth:
            India: "#ffb020"
            Iran: "#2ee6a6"
          routes:
            - coords: [[72.8, 18.9], [67, 22], [60.6, 25.3]]
              color: "#2ee6a6"
              width: 5
              arc: true
              arrow: true
              glow: 6
              draw_on: { delay: 14, duration: 36, easing: easeInOut }
          markers:
            - { coord: [60.6, 25.3], label: "Chabahar", color: "#2ee6a6", radius: 12, label_size: 38 }
            - { coord: [72.8, 18.9], label: "Mumbai", color: "#f5f7fa", radius: 8, label_size: 28 }
          markers_pop: { delay: 28, duration: 18, stagger: 8 }
          effects:
            - { kind: glow, color: "#2ee6a6", radius: 7, intensity: 0.45 }
      - text: "भारत का जवाब"
        as: title
        at: top
        args: { z: 20, size: 78, weight: 800, color: "#f5f7fa", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", effects: [ { kind: drop_shadow, dx: 0, dy: 4, blur: 14, color: "#000000", opacity: 0.85 } ], anim: { preset: rise, duration: 20, distance: 70 } }
      - text: "Chabahar Port"
        as: sub
        at: bottom
        args: { z: 20, size: 54, weight: 800, color: "#2ee6a6", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", effects: [ { kind: glow, color: "#2ee6a6", radius: 8, intensity: 0.6 } ], anim: { preset: fade, duration: 18 } }
    camera: hold
    duration: { seconds: 5.1 }
    transition: { kind: fade, duration: 16 }

  # ==================================================== B8 — INSIGHT (face-off) =======================
  - id: faceoff
    say: "Gwadar और Chabahar, सिर्फ़ एक सौ सत्तर किलोमीटर दूर। दो देश, दो बंदरगाह, एक जंग।"
    sfx:
      - { name: whoosh, at: 2 }
      - { name: pop, at: 8 }
      - { name: pop, at: 12 }
      - { name: ding, at: 20 }
    show:
      - shape: rect
        as: bg
        args: { z: 0, position: [540, 960], params: { width: 1080, height: 1920 }, fill: { a: 0, k: "#0a0d14" } }
      # zoom into the Makran coast — the two rival ports side by side
      - generator: world-in
        as: world
        args:
          projection: mercator
          fit: false
          center: [61.4, 25.6]
          scale: 2600
          fill: "#223249"
          no_data_fill: "#223249"
          stroke: "#2a3648"
          stroke_width: 1.0
          ocean: "#0a1420"
          graticule: { step: 3, color: "#1a2636", opacity: 0.45, width: 0.6 }
          labels:
            Iran: Iran
            Pakistan: Pakistan
          choropleth:
            Iran: "#123a30"
            Pakistan: "#2e2028"
          # a short "rivalry" link between the two ports
          routes:
            - coords: [[60.6, 25.3], [62.3, 25.1]]
              color: "#f5f7fa"
              width: 3
              arc: false
              dash: 14
              glow: 3
              draw_on: { delay: 18, duration: 24 }
          markers:
            - { coord: [60.6, 25.3], label: "Chabahar", color: "#2ee6a6", radius: 13, label_size: 42, label_dy: -30 }
            - { coord: [62.3, 25.1], label: "Gwadar", color: "#ff9f43", radius: 13, label_size: 42, label_dy: 46 }
          markers_pop: { delay: 8, duration: 20, stagger: 10 }
      - text: "170 KM की जंग"
        as: title
        at: top
        args: { z: 20, size: 76, weight: 800, color: "#f5f7fa", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", effects: [ { kind: drop_shadow, dx: 0, dy: 4, blur: 14, color: "#000000", opacity: 0.85 } ], anim: { preset: rise, duration: 20, distance: 60 } }
    camera: slow_push_in
    duration: { seconds: 6.2 }
    transition: { kind: fade, duration: 16 }

  # ============================== B9 — PAYOFF + LOOP (callbacks the hook) ==============================
  # Viral-structure close: RETURN to the tanker footage + the EXACT hook text ("एक रास्ता। पूरी दुनिया।") →
  # a visual + verbal LOOP that drives rewatches. The thesis lands in the narration; NO in-video "follow"
  # CTA (it breaks the loop — the CTA lives in the video DESCRIPTION instead).
  - id: payoff
    say: "अगली जंग शायद ज़मीन पर नहीं, इन्हीं समंदर के रास्तों पर होगी। एक रास्ता, और पूरी दुनिया की किस्मत।"
    sfx:
      - { name: whoosh, at: 2 }
      - { name: boom, at: 10 }
    show:
      - shape: rect
        as: bg
        args: { z: 0, position: [540, 960], params: { width: 1080, height: 1920 }, fill: { a: 0, k: "#0a0d14" } }
      - footage: tanker
        as: broll
        args:
          z: 1
          loop: true
          muted: true
          fit: cover
          effects:
            - { kind: color_grade, brightness: 0.44, contrast: 1.14, saturate: 0.6, hue: 18 }
            - { kind: blur, radius: 2 }
            - { kind: vignette, amount: 0.5, softness: 0.6 }
      - shape: rect
        as: scrim
        args: { z: 2, position: [540, 960], params: { width: 1080, height: 1920 }, fill: { a: 0, k: "#0a0d14" }, opacity: 0.5 }
      - text: "एक रास्ता। पूरी दुनिया।"
        as: loop
        at: center
        args: { z: 20, size: 92, weight: 800, color: "#f5f7fa", font: "Mukta", fontUri: "asset://fonts/Mukta-ExtraBold.ttf", effects: [ { kind: glow, color: "#ffb020", radius: 14, intensity: 0.7 }, { kind: drop_shadow, dx: 0, dy: 5, blur: 18, color: "#000000", opacity: 0.85 } ], anim: { preset: fade, duration: 10 } }
    camera: slow_push_in
    duration: { seconds: 6 }
