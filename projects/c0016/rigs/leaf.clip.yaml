# leaf — a single flat-shape leaf: a base green almond + a yellow-green LIT half on a diagonal.
# Two flats; volume comes from the diagonal split (color contrast), NO gradient, NO stroke.
# KEPT as morph (per the build note): the rounded almond + its 2-tone diagonal split need a custom
# path that no primitive provides. Authored rig-local (origin = leaf centre). Params = animation hooks.
duration_frames: 90
params:
  size: { type: number, default: 100 }       # uniform scale (percent) of the whole leaf
  tilt: { type: number, default: 0 }         # rotation (deg) of the whole leaf
  tone: { type: color, default: "#4cc23f" }  # the base green
layers:
  # base — full rounded almond leaf shape (rounded both ends)
  - type: shape
    id: base
    z: 1
    morph: { a: 0, k: "M -130 26 C -100 -86 110 -92 142 -20 C 112 96 -100 104 -130 26 Z" }
    fill: { a: 0, k: { $param: tone } }
    transform:
      position: { a: 0, k: [0, 0] }
      scale: { a: 0, k: { $param: size } }
      rotation: { a: 0, k: { $param: tilt } }
  # lit half — the lower diagonal facet, brighter yellow-green
  - type: shape
    id: lit
    z: 2
    morph: { a: 0, k: "M -130 26 L 142 -20 C 112 96 -100 104 -130 26 Z" }
    fill: { a: 0, k: "#b8e04a" }
    transform:
      position: { a: 0, k: [0, 0] }
      scale: { a: 0, k: { $param: size } }
      rotation: { a: 0, k: { $param: tilt } }
