# bird — PRIMITIVE flat shapes (centred at their transform.position, predictable composition).
# Crimson head (big near-circle) + body ellipse continuing off bottom-right; violet capsule beak
# ATTACHED to the lower-front of the head (overlaps head, juts LEFT) + navy tip; navy wing; pale-blue
# belly; stacked-circle eye. Faces LEFT. Flat, NO stroke. Origin = head centre.
duration_frames: 90
params:
  headTurn: { type: number, default: 0 }   # future: head rotation hook (deg)
  blink: { type: number, default: 0 }      # future: eyelid hook (0 open .. 1 shut)
  beakOpen: { type: number, default: 0 }   # future: lower-mandible hook
layers:
  # --- body: crimson ellipse below/right of the head, continuing off the bottom-right edge ---
  - type: shape
    id: body
    z: 1
    shape: { kind: ellipse, rx: 420, ry: 470 }
    fill: { a: 0, k: "#c4123a" }
    transform: { position: { a: 0, k: [260, 520] } }
  # --- head: big crimson near-circle, upper area ---
  - type: shape
    id: head
    z: 2
    shape: { kind: circle, radius: 380 }
    fill: { a: 0, k: "#c4123a" }
    transform: { position: { a: 0, k: [0, 0] } }
  # --- belly: pale blue-grey patch, front-bottom of the head/chest ---
  - type: shape
    id: belly
    z: 6
    shape: { kind: ellipse, rx: 175, ry: 260 }
    fill: { a: 0, k: "#cde0ec" }
    transform: { position: { a: 0, k: [-120, 500] } }
  # --- wing: dark navy rounded mass on the lower-right body ---
  - type: shape
    id: wing
    z: 4
    shape: { kind: ellipse, rx: 330, ry: 300 }
    fill: { a: 0, k: "#1f3a63" }
    transform: { position: { a: 0, k: [300, 430] } }
  # --- beak upper: violet thick rounded capsule, juts LEFT; right end overlaps the head ---
  - type: shape
    id: beak
    z: 5
    shape: { kind: ellipse, rx: 210, ry: 72 }
    fill: { a: 0, k: "#6e4fb0" }
    transform: { position: { a: 0, k: [-230, 70] } }
  # --- beak tip: small navy ellipse at the far-LEFT end of the beak ---
  - type: shape
    id: beak_tip
    z: 6
    shape: { kind: ellipse, rx: 46, ry: 56 }
    fill: { a: 0, k: "#1c2a4f" }
    transform: { position: { a: 0, k: [-420, 66] } }
  # --- eye stack: navy ring -> blue iris -> near-black pupil -> peach highlight (upper-right of head) ---
  - type: shape
    id: eye_ring
    z: 7
    shape: { kind: circle, radius: 58 }
    fill: { a: 0, k: "#1c2a4f" }
    transform: { position: { a: 0, k: [150, -70] } }
  - type: shape
    id: eye_iris
    z: 8
    shape: { kind: circle, radius: 42 }
    fill: { a: 0, k: "#3a5fa0" }
    transform: { position: { a: 0, k: [150, -70] } }
  - type: shape
    id: eye_pupil
    z: 9
    shape: { kind: circle, radius: 22 }
    fill: { a: 0, k: "#0a1226" }
    transform: { position: { a: 0, k: [142, -64] } }
  - type: shape
    id: eye_hi
    z: 10
    shape: { kind: circle, radius: 13 }
    fill: { a: 0, k: "#f3d4a8" }
    transform: { position: { a: 0, k: [168, -88] } }
