# plant — a brown forked branch (PRIMITIVE rounded rects, predictable composition) + nested LEAF clip
# instances (clip-in-clip; collectClipDefs recurses + resolves `leaf` project-locally). Thicker, taller
# trunk; the leaves form a LAYERED, OVERLAPPING cluster (a prominent down-left pair + a dense canopy + a
# big horizontal perch leaf + lower-centre hangers) — NOT an even radial fan. Flat shapes, NO stroke.
# Origin near the fork (~[0,-30]); trunk grows downward (+y), forks + leaves spread up.
duration_frames: 90
params:
  sway: { type: number, default: 0 }      # future: whole-plant rotation hook (deg)
  leafCount: { type: number, default: 8 } # documented hook (static layout here)
layers:
  # --- branch: ONE curved, tapering, forked limb (a filled bezier silhouette). Trunk rises from the
  # bottom with an organic lean and splits into two curved forks that taper toward their tips. Curves,
  # not straight rects (the reference branch is sinuous + tapering). Rig-local; origin near the crotch. ---
  - type: shape
    id: branch
    z: 1
    morph:
      a: 0
      k: "M -56 540 C -80 360 -64 150 -34 -8 C -96 -150 -178 -300 -238 -398
          C -216 -414 -190 -406 -176 -374 C -128 -250 -72 -118 -6 -34
          C 20 -150 66 -288 152 -394 C 174 -410 198 -402 206 -368
          C 158 -242 92 -96 46 -14 C 66 150 66 372 50 540 Z"
    fill: { a: 0, k: "#9a5a2a" }
    transform: { position: { a: 0, k: [0, 0] }, rotation: { a: 0, k: { $param: sway } } }
  # darker inner facet (a slimmer curved path offset right) for a hint of round
  - type: shape
    id: branch_facet
    z: 2
    morph:
      a: 0
      k: "M 14 530 C 30 350 30 150 18 -10 C 44 -150 96 -286 168 -388
          C 150 -300 96 -120 52 -16 C 70 150 70 360 50 530 Z"
    fill: { a: 0, k: "#7c451f" }
    transform: { position: { a: 0, k: [0, 0] }, rotation: { a: 0, k: { $param: sway } } }

  # --- LEAVES: nested leaf clip instances (clip-in-clip), a LAYERED overlapping cluster (8). ---
  # prominent DOWN-LEFT pair (big, pointing down-left — the reference's strong lower-left leaves)
  - type: clip
    id: leaf_dl1
    ref: leaf
    z: 3
    args: { tone: "#4cc23f" }
    transform: { position: { a: 0, k: [-360, 30] }, scale: { a: 0, k: 145 }, rotation: { a: 0, k: 16 } }
  - type: clip
    id: leaf_dl2
    ref: leaf
    z: 4
    args: { tone: "#3fae3a" }
    transform: { position: { a: 0, k: [-250, -140] }, scale: { a: 0, k: 120 }, rotation: { a: 0, k: 46 } }
  # dense CANOPY (top), overlapping — a big back leaf, an angled left, the perch, an angled right
  - type: clip
    id: leaf_canopy_back
    ref: leaf
    z: 3
    args: { tone: "#3aaa37" }
    transform: { position: { a: 0, k: [-30, -440] }, scale: { a: 0, k: 150 }, rotation: { a: 0, k: 14 } }
  - type: clip
    id: leaf_top_l
    ref: leaf
    z: 4
    args: { tone: "#4cc23f" }
    transform: { position: { a: 0, k: [-190, -360] }, scale: { a: 0, k: 126 }, rotation: { a: 0, k: 44 } }
  # PERCH leaf — the caterpillar's seat: BIG + roughly horizontal, front of the canopy
  - type: clip
    id: leaf_perch
    ref: leaf
    z: 6
    args: { tone: "#52c84a" }
    transform: { position: { a: 0, k: [120, -378] }, scale: { a: 0, k: 200 }, rotation: { a: 0, k: 5 } }
  - type: clip
    id: leaf_top_r
    ref: leaf
    z: 4
    args: { tone: "#3fae3a" }
    transform: { position: { a: 0, k: [330, -300] }, scale: { a: 0, k: 116 }, rotation: { a: 0, k: -30 } }
  # lower-centre hangers on the right fork (pointing down)
  - type: clip
    id: leaf_lc1
    ref: leaf
    z: 3
    args: { tone: "#46bf42" }
    transform: { position: { a: 0, k: [235, 40] }, scale: { a: 0, k: 116 }, rotation: { a: 0, k: -60 } }
  - type: clip
    id: leaf_lc2
    ref: leaf
    z: 3
    args: { tone: "#3aaa37" }
    transform: { position: { a: 0, k: [285, -150] }, scale: { a: 0, k: 96 }, rotation: { a: 0, k: -34 } }
